<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPU Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="taskbar">
        <div class="startmenu">
            <span class="win-icon"></span>
            <span>Start</span>
        </div>
        <div class="taskbar-icons">
            <span>0</span>
            <span>0</span>
            <span>0</span>
            <span>0</span>
        </div>
        <div class="taskbar-time">14:32</div>
    </div>

    <div class="desktop">

        <div class="gallery-header">
            <h1>Processor Gallery (13 CPUs)</h1>
            <p class="sub">CPU</p>
        </div>

        <div class="cpu-grid" id="cpuGrid"></div>

        <div class="status-bar">
            <span>13 items</span>
            <span>Layout: Grid</span>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
